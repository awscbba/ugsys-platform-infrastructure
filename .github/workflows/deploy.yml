name: Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - "*.md"
      - ".gitignore"
      - ".kiro/**"

  # Allow manual deploy with optional env override
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: false
        default: "prod"
        type: choice
        options: [prod, dev]

env:
  PYTHON_VERSION: "3.13"
  NODE_VERSION: "20"
  AWS_REGION: "us-east-1"
  CDK_ENV: ${{ github.event.inputs.environment || 'prod' }}

permissions:
  id-token: write   # required for OIDC
  contents: read

jobs:
  # ============================================================
  # Diff — always runs, shows what will change
  # ============================================================
  diff:
    name: CDK Diff (${{ github.event.inputs.environment || 'prod' }})
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install CDK
        run: npm install -g aws-cdk

      - name: CDK diff
        run: |
          uv run cdk diff --app "python infra/app.py" \
            --context env=${{ env.CDK_ENV }} \
            --context account=${{ secrets.AWS_ACCOUNT_ID }} \
            --context region=${{ env.AWS_REGION }} \
            --context certificate_arn=${{ secrets.CERTIFICATE_ARN }} \
            UgsysPlatformSecurity-${{ env.CDK_ENV }} \
            UgsysPlatformEventBus-${{ env.CDK_ENV }} \
            UgsysPlatformGithubOidc-${{ env.CDK_ENV }} \
            UgsysPlatformObservability-${{ env.CDK_ENV }} \
            UgsysIdentityManager-${{ env.CDK_ENV }} \
            UgsysUserProfileService-${{ env.CDK_ENV }} \
            UgsysProjectsRegistry-${{ env.CDK_ENV }} \
            UgsysAdminPanelEcr-${{ env.CDK_ENV }} \
            UgsysAdminPanel-${{ env.CDK_ENV }} \
            UgsysFrontend-${{ env.CDK_ENV }} \
            UgsysProfileFrontend-${{ env.CDK_ENV }} \
            2>&1 || true
        # || true — diff exits 1 when there are changes, which is expected
        # UgsysPlatformDns is intentionally excluded — it has a stable cross-stack
        # export consumed by UgsysFrontend and should only be deployed explicitly
        # when DNS changes are intentional.

  # ============================================================
  # Bootstrap ECR — ensures the ECR repo exists and has a
  # placeholder image before the AdminPanel Lambda stack deploys.
  # Runs after diff, before the main deploy.
  # ============================================================
  bootstrap-ecr:
    name: Bootstrap ECR (${{ github.event.inputs.environment || 'prod' }})
    runs-on: ubuntu-latest
    needs: [diff]
    environment: ${{ github.event.inputs.environment || 'prod' }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install CDK
        run: npm install -g aws-cdk

      - name: Deploy ECR repo only
        # Deploy just the ECR repository so it exists before the Lambda stack.
        # CDK will create the repo; subsequent steps push the placeholder image.
        run: |
          uv run cdk deploy --app "python infra/app.py" \
            --context env=${{ env.CDK_ENV }} \
            --context account=${{ secrets.AWS_ACCOUNT_ID }} \
            --context region=${{ env.AWS_REGION }} \
            --context certificate_arn=${{ secrets.CERTIFICATE_ARN }} \
            UgsysAdminPanelEcr-${{ env.CDK_ENV }} \
            --require-approval never 2>&1 || true
          # || true — stack may already be fully deployed

      - name: Push placeholder image to ECR (first deploy only)
        run: |
          ECR_URI="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/ugsys-admin-panel"
          # Check if a "latest" image already exists — skip if so
          if aws ecr describe-images \
              --repository-name ugsys-admin-panel \
              --image-ids imageTag=latest \
              --region ${{ env.AWS_REGION }} 2>/dev/null; then
            echo "ECR image already exists — skipping placeholder push"
          else
            echo "Pushing placeholder image to ECR..."
            aws ecr get-login-password --region ${{ env.AWS_REGION }} \
              | docker login --username AWS --password-stdin "$ECR_URI"
            docker pull public.ecr.aws/lambda/python:3.13
            docker tag public.ecr.aws/lambda/python:3.13 "$ECR_URI:latest"
            docker push "$ECR_URI:latest"
            echo "Placeholder image pushed successfully"
          fi

      - name: Adopt orphaned AdminPanel resources (first deploy only)
        # Idempotently removes resources that may exist from a previous failed/rolled-back
        # stack deploy. Safe because these are empty on first deploy.
        # On subsequent deploys these resources are owned by CloudFormation and
        # this step is a no-op (all aws cli calls will succeed or be skipped).
        run: |
          ENV=${{ env.CDK_ENV }}

          # Delete the ROLLBACK_COMPLETE stack if it exists in that state
          STACK_STATUS=$(aws cloudformation describe-stacks \
            --stack-name "UgsysAdminPanel-${ENV}" \
            --region ${{ env.AWS_REGION }} \
            --query 'Stacks[0].StackStatus' \
            --output text 2>/dev/null || echo "DOES_NOT_EXIST")
          echo "UgsysAdminPanel-${ENV} status: ${STACK_STATUS}"

          if [[ "$STACK_STATUS" == "ROLLBACK_COMPLETE" ]]; then
            echo "Deleting ROLLBACK_COMPLETE stack..."
            aws cloudformation delete-stack \
              --stack-name "UgsysAdminPanel-${ENV}" \
              --region ${{ env.AWS_REGION }}
            aws cloudformation wait stack-delete-complete \
              --stack-name "UgsysAdminPanel-${ENV}" \
              --region ${{ env.AWS_REGION }}
            echo "Stack deleted"
          fi

          # Only clean up orphaned resources if stack is gone
          STACK_STATUS=$(aws cloudformation describe-stacks \
            --stack-name "UgsysAdminPanel-${ENV}" \
            --region ${{ env.AWS_REGION }} \
            --query 'Stacks[0].StackStatus' \
            --output text 2>/dev/null || echo "DOES_NOT_EXIST")

          if [[ "$STACK_STATUS" == "DOES_NOT_EXIST" ]]; then
            echo "Stack does not exist — cleaning up any orphaned resources..."

            for TABLE in "ugsys-admin-audit-log-${ENV}" "ugsys-admin-service-registry-${ENV}"; do
              if aws dynamodb describe-table --table-name "$TABLE" --region ${{ env.AWS_REGION }} 2>/dev/null; then
                echo "Deleting orphaned DynamoDB table: $TABLE"
                aws dynamodb delete-table --table-name "$TABLE" --region ${{ env.AWS_REGION }}
                aws dynamodb wait table-not-exists --table-name "$TABLE" --region ${{ env.AWS_REGION }}
                echo "Deleted: $TABLE"
              else
                echo "Table $TABLE not found — skipping"
              fi
            done

            BUCKET="ugsys-admin-shell-${ENV}"
            if aws s3api head-bucket --bucket "$BUCKET" 2>/dev/null; then
              echo "Deleting orphaned S3 bucket: $BUCKET"
              aws s3 rm "s3://$BUCKET" --recursive 2>/dev/null || true
              aws s3api delete-bucket --bucket "$BUCKET" --region ${{ env.AWS_REGION }}
              echo "Deleted: $BUCKET"
            else
              echo "Bucket $BUCKET not found — skipping"
            fi
          else
            echo "Stack exists (${STACK_STATUS}) — skipping orphan cleanup"
          fi

  # ============================================================
  # Deploy — runs after ECR bootstrap, deploys all stacks
  # ============================================================
  deploy:
    name: CDK Deploy (${{ github.event.inputs.environment || 'prod' }})
    runs-on: ubuntu-latest
    needs: [bootstrap-ecr]
    environment: ${{ github.event.inputs.environment || 'prod' }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install CDK
        run: npm install -g aws-cdk

      - name: CDK deploy
        run: |
          uv run cdk deploy --app "python infra/app.py" \
            --context env=${{ env.CDK_ENV }} \
            --context account=${{ secrets.AWS_ACCOUNT_ID }} \
            --context region=${{ env.AWS_REGION }} \
            --context certificate_arn=${{ secrets.CERTIFICATE_ARN }} \
            UgsysPlatformSecurity-${{ env.CDK_ENV }} \
            UgsysPlatformEventBus-${{ env.CDK_ENV }} \
            UgsysPlatformGithubOidc-${{ env.CDK_ENV }} \
            UgsysPlatformObservability-${{ env.CDK_ENV }} \
            UgsysIdentityManager-${{ env.CDK_ENV }} \
            UgsysUserProfileService-${{ env.CDK_ENV }} \
            UgsysProjectsRegistry-${{ env.CDK_ENV }} \
            UgsysAdminPanelEcr-${{ env.CDK_ENV }} \
            UgsysAdminPanel-${{ env.CDK_ENV }} \
            UgsysFrontend-${{ env.CDK_ENV }} \
            UgsysProfileFrontend-${{ env.CDK_ENV }} \
            --require-approval never \
            --outputs-file cdk-outputs.json
        # UgsysPlatformDns is intentionally excluded — stable cross-stack export,
        # only deploy explicitly when DNS changes are intentional.

      - name: Upload CDK outputs
        uses: actions/upload-artifact@v4
        with:
          name: cdk-outputs-${{ env.CDK_ENV }}
          path: cdk-outputs.json
          retention-days: 30

  # ============================================================
  # Notify
  # ============================================================
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [deploy]
    if: always()
    steps:
      - name: Slack — success
        if: needs.deploy.result == 'success'
        continue-on-error: true
        uses: slackapi/slack-github-action@v2.0.0
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            {
              "channel": "${{ secrets.SLACK_CHANNEL_ID }}",
              "username": "ugsys CI/CD",
              "icon_emoji": ":white_check_mark:",
              "text": "✅ Deploy succeeded — ugsys-platform-infrastructure",
              "blocks": [
                {
                  "type": "header",
                  "text": {"type": "plain_text", "text": "✅ Deploy succeeded — ugsys-platform-infrastructure", "emoji": true}
                },
                {
                  "type": "section",
                  "fields": [
                    {"type": "mrkdwn", "text": "*Env:*\n${{ env.CDK_ENV }}"},
                    {"type": "mrkdwn", "text": "*By:*\n${{ github.actor }}"}
                  ]
                }
              ]
            }

      - name: Slack — failure
        if: needs.deploy.result != 'success'
        continue-on-error: true
        uses: slackapi/slack-github-action@v2.0.0
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            {
              "channel": "${{ secrets.SLACK_CHANNEL_ID }}",
              "username": "ugsys CI/CD",
              "icon_emoji": ":x:",
              "text": "❌ Deploy failed — ugsys-platform-infrastructure",
              "blocks": [
                {
                  "type": "header",
                  "text": {"type": "plain_text", "text": "❌ Deploy failed — ugsys-platform-infrastructure", "emoji": true}
                },
                {
                  "type": "section",
                  "fields": [
                    {"type": "mrkdwn", "text": "*Env:*\n${{ env.CDK_ENV }}"},
                    {"type": "mrkdwn", "text": "*Run:*\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View logs>"}
                  ]
                }
              ]
            }
