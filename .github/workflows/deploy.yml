name: Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - "*.md"
      - ".gitignore"

  # Allow manual deploy with optional env override
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: false
        default: "prod"
        type: choice
        options: [prod, dev]

env:
  PYTHON_VERSION: "3.13"
  NODE_VERSION: "20"
  AWS_REGION: "us-east-1"
  CDK_ENV: ${{ github.event.inputs.environment || 'prod' }}

permissions:
  id-token: write   # required for OIDC
  contents: read

jobs:
  # ============================================================
  # Diff — always runs, shows what will change
  # ============================================================
  diff:
    name: CDK Diff (${{ github.event.inputs.environment || 'prod' }})
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install CDK
        run: npm install -g aws-cdk

      - name: CDK diff
        run: |
          uv run cdk diff --app "python infra/app.py" \
            --context env=${{ env.CDK_ENV }} \
            --context account=${{ secrets.AWS_ACCOUNT_ID }} \
            --context region=${{ env.AWS_REGION }} \
            --context certificate_arn=${{ secrets.CERTIFICATE_ARN }} \
            UgsysPlatformSecurity-${{ env.CDK_ENV }} \
            UgsysPlatformEventBus-${{ env.CDK_ENV }} \
            UgsysPlatformGithubOidc-${{ env.CDK_ENV }} \
            UgsysPlatformObservability-${{ env.CDK_ENV }} \
            UgsysIdentityManager-${{ env.CDK_ENV }} \
            UgsysUserProfileService-${{ env.CDK_ENV }} \
            UgsysProjectsRegistry-${{ env.CDK_ENV }} \
            UgsysAdminPanel-${{ env.CDK_ENV }} \
            UgsysFrontend-${{ env.CDK_ENV }} \
            2>&1 || true
        # || true — diff exits 1 when there are changes, which is expected
        # UgsysPlatformDns is intentionally excluded — it has a stable cross-stack
        # export consumed by UgsysFrontend and should only be deployed explicitly
        # when DNS changes are intentional.

  # ============================================================
  # Deploy — runs after diff, requires manual approval on prod
  # ============================================================
  deploy:
    name: CDK Deploy (${{ github.event.inputs.environment || 'prod' }})
    runs-on: ubuntu-latest
    needs: [diff]
    environment: ${{ github.event.inputs.environment || 'prod' }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install CDK
        run: npm install -g aws-cdk

      - name: Bootstrap ECR with placeholder image (first deploy only)
        run: |
          ECR_URI="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/ugsys-admin-panel"
          # Ensure ECR repo exists and has at least one image tagged "latest"
          # so the Lambda stack can be created. Skip if image already exists.
          aws ecr describe-images --repository-name ugsys-admin-panel \
            --image-ids imageTag=latest --region ${{ env.AWS_REGION }} 2>/dev/null && {
            echo "ECR image already exists — skipping placeholder push"
          } || {
            echo "No image found — pushing placeholder to ECR"
            aws ecr get-login-password --region ${{ env.AWS_REGION }} \
              | docker login --username AWS --password-stdin "$ECR_URI"
            docker pull public.ecr.aws/lambda/python:3.13
            docker tag public.ecr.aws/lambda/python:3.13 "$ECR_URI:latest"
            docker push "$ECR_URI:latest"
          }
        continue-on-error: true
        # continue-on-error: ECR repo may not exist yet on very first deploy;
        # CDK will create it in the same deploy run, then the admin-panel
        # deploy workflow will push the real image.

      - name: CDK deploy
        run: |
          uv run cdk deploy --app "python infra/app.py" \
            --context env=${{ env.CDK_ENV }} \
            --context account=${{ secrets.AWS_ACCOUNT_ID }} \
            --context region=${{ env.AWS_REGION }} \
            --context certificate_arn=${{ secrets.CERTIFICATE_ARN }} \
            UgsysPlatformSecurity-${{ env.CDK_ENV }} \
            UgsysPlatformEventBus-${{ env.CDK_ENV }} \
            UgsysPlatformGithubOidc-${{ env.CDK_ENV }} \
            UgsysPlatformObservability-${{ env.CDK_ENV }} \
            UgsysIdentityManager-${{ env.CDK_ENV }} \
            UgsysUserProfileService-${{ env.CDK_ENV }} \
            UgsysProjectsRegistry-${{ env.CDK_ENV }} \
            UgsysAdminPanel-${{ env.CDK_ENV }} \
            UgsysFrontend-${{ env.CDK_ENV }} \
            --require-approval never \
            --outputs-file cdk-outputs.json
        # UgsysPlatformDns is intentionally excluded — it has a stable cross-stack
        # export consumed by UgsysFrontend and should only be deployed explicitly
        # when DNS changes are intentional.

      - name: Upload CDK outputs
        uses: actions/upload-artifact@v4
        with:
          name: cdk-outputs-${{ env.CDK_ENV }}
          path: cdk-outputs.json
          retention-days: 30

  # ============================================================
  # Notify
  # ============================================================
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [deploy]
    if: always()
    steps:
      - name: Slack — success
        if: needs.deploy.result == 'success'
        continue-on-error: true
        uses: slackapi/slack-github-action@v2.0.0
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            {
              "channel": "${{ secrets.SLACK_CHANNEL_ID }}",
              "username": "ugsys CI/CD",
              "icon_emoji": ":white_check_mark:",
              "text": "✅ Deploy succeeded — ugsys-platform-infrastructure",
              "blocks": [
                {
                  "type": "header",
                  "text": {"type": "plain_text", "text": "✅ Deploy succeeded — ugsys-platform-infrastructure", "emoji": true}
                },
                {
                  "type": "section",
                  "fields": [
                    {"type": "mrkdwn", "text": "*Env:*\n${{ env.CDK_ENV }}"},
                    {"type": "mrkdwn", "text": "*By:*\n${{ github.actor }}"}
                  ]
                }
              ]
            }

      - name: Slack — failure
        if: needs.deploy.result != 'success'
        continue-on-error: true
        uses: slackapi/slack-github-action@v2.0.0
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            {
              "channel": "${{ secrets.SLACK_CHANNEL_ID }}",
              "username": "ugsys CI/CD",
              "icon_emoji": ":x:",
              "text": "❌ Deploy failed — ugsys-platform-infrastructure",
              "blocks": [
                {
                  "type": "header",
                  "text": {"type": "plain_text", "text": "❌ Deploy failed — ugsys-platform-infrastructure", "emoji": true}
                },
                {
                  "type": "section",
                  "fields": [
                    {"type": "mrkdwn", "text": "*Env:*\n${{ env.CDK_ENV }}"},
                    {"type": "mrkdwn", "text": "*Run:*\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View logs>"}
                  ]
                }
              ]
            }
