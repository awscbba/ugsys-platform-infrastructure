name: CI

on:
  push:
    branches: [feature/**, fix/**, develop]
    paths-ignore:
      - '*.md'
      - '.gitignore'
  pull_request:
    branches: [main]
    paths-ignore:
      - '*.md'
      - '.gitignore'

env:
  PYTHON_VERSION: "3.13"
  NODE_VERSION: "20"

jobs:
  # ============================================================
  # Detect changes
  # ============================================================
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      infra: ${{ steps.filter.outputs.infra }}
      any_code: ${{ steps.filter.outputs.any_code }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: filter
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            CHANGED=$(git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}" 2>/dev/null || echo "")
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")
          fi
          echo "infra=$(echo "$CHANGED" | grep -q '^infra/' && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "any_code=$(echo "$CHANGED" | grep -qE '\.(py|toml|yml|yaml|json)$' && echo true || echo false)" >> $GITHUB_OUTPUT

  # ============================================================
  # Lint CDK stacks
  # ============================================================
  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.infra == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Ruff lint
        run: uv tool run ruff check infra/stacks/

      - name: Ruff format check
        run: uv tool run ruff format --check infra/stacks/

  # ============================================================
  # CDK Synth
  # ============================================================
  cdk-synth:
    name: CDK Synth
    runs-on: ubuntu-latest
    needs: [changes, lint]
    if: |
      always()
      && needs.changes.outputs.infra == 'true'
      && (needs.lint.result == 'success' || needs.lint.result == 'skipped')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install CDK
        run: npm install -g aws-cdk

      - name: CDK synth
        run: uv run cdk synth --app "python infra/app.py" --quiet

  # ============================================================
  # IaC Security Scan (PRs only)
  # ============================================================
  iac-security:
    name: IaC Security Scan
    runs-on: ubuntu-latest
    needs: [changes, cdk-synth]
    if: |
      always()
      && github.event_name == 'pull_request'
      && needs.changes.outputs.infra == 'true'
      && needs.cdk-synth.result == 'success'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install CDK
        run: npm install -g aws-cdk

      - name: CDK synth (generate CloudFormation)
        run: uv run cdk synth --app "python infra/app.py" --quiet

      - name: Checkov IaC scan
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: infra/cdk.out
          framework: cloudformation
          soft_fail: true
          output_format: cli

  # ============================================================
  # Secret scan (PRs only)
  # ============================================================
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    needs: [changes]
    if: github.event_name == 'pull_request' && needs.changes.outputs.any_code == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================================
  # Slack notifications
  # ============================================================
  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [lint, cdk-synth, iac-security, secret-scan]
    if: failure() && github.event_name == 'pull_request'
    steps:
      - name: Send Slack notification
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "blocks": [
                {
                  "type": "header",
                  "text": {"type": "plain_text", "text": "❌ CI Failed — ugsys-platform-infrastructure", "emoji": true}
                },
                {
                  "type": "section",
                  "fields": [
                    {"type": "mrkdwn", "text": "*Branch:*\n${{ github.head_ref }}"},
                    {"type": "mrkdwn", "text": "*PR:*\n#${{ github.event.pull_request.number }}"}
                  ]
                },
                {
                  "type": "actions",
                  "elements": [
                    {"type": "button", "text": {"type": "plain_text", "text": "View Run"}, "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
